<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solara TV Pro</title>
    <link rel="stylesheet" href="css/tv.css">
</head>
<body>
    <div id="tv-container">
        <!-- 左栏：搜索框与列表 (Zone: left) -->
        <div id="left-panel">
            <div class="search-header">
                <!-- 原生输入框，电视获得焦点后按确定键会弹出自带软键盘 -->
                <input type="text" id="search-input" class="tv-focusable" tabindex="0" data-zone="left" placeholder="输入歌手或歌名...">
            </div>
            
            <div id="loading" style="display: none; padding: 20px; text-align: center;">加载中...</div>
            
            <ul id="song-list">
                <!-- 列表将通过 JS 动态生成 -->
            </ul>
        </div>

        <!-- 中栏：核心功能按钮区 (Zone: middle) -->
        <div id="middle-panel">
            <div id="btn-search" class="tv-focusable middle-btn" tabindex="0" data-zone="middle">🔍 搜索</div>
            <div id="btn-source" class="tv-focusable middle-btn" tabindex="0" data-zone="middle">源: 网易云</div>
            <div id="btn-view" class="tv-focusable middle-btn" tabindex="0" data-zone="middle">视图: 搜索</div>
        </div>

        <!-- 右栏：播放控制与歌词 (Zone: right) -->
        <div id="right-panel">
            <div class="album-art-container">
                <img id="album-cover" src="https://via.placeholder.com/400" alt="Album Cover">
            </div>
            
            <div class="song-info">
                <h1 id="song-title">Solara 音乐</h1>
                <p id="song-artist">准备播放</p>
            </div>

            <!-- 播放控制台 -->
            <div id="controls">
                <div id="btn-mode" class="tv-focusable control-btn" tabindex="0" data-zone="right" title="循环模式">🔁</div>
                <div id="btn-prev" class="tv-focusable control-btn" tabindex="0" data-zone="right" title="上一首">⏮</div>
                <div id="btn-play" class="tv-focusable control-btn" tabindex="0" data-zone="right" title="播放/暂停">▶️</div>
                <div id="btn-next" class="tv-focusable control-btn" tabindex="0" data-zone="right" title="下一首">⏭</div>
            </div>

            <!-- 歌词显示区 -->
            <div id="lyrics-container">
                <div id="lyrics-text">暂无歌词</div>
            </div>
        </div>
    </div>

    <audio id="audio-player" style="display:none;"></audio>
    <script src="js/tv.js"></script>
</body>
</html>
