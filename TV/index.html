<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solara TV</title>
    <link rel="stylesheet" href="css/tv.css">
</head>
<body>
    <div id="tv-container">
        <!-- ===== 左栏：搜索 + 歌曲列表 (33%) ===== -->
        <div id="left-panel">
            <!-- 搜索框 -->
            <div id="search-bar">
                <input id="search-input" type="text" placeholder="输入歌名/歌手搜索..."
                       class="tv-focusable" data-zone="left" tabindex="0">
            </div>
            <!-- 歌曲列表 -->
            <div id="song-list-wrapper">
                <div id="loading"><span class="spinner"></span>搜索中...</div>
                <div id="song-list">
                    <div class="empty-tip">
                        <span class="icon">🎵</span>
                        输入关键词搜索歌曲
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 中间：控制按钮竖排 ===== -->
        <div id="center-controls">
            <div id="btn-search" class="ctrl-item tv-focusable" data-zone="ctrl" tabindex="0" title="搜索">
                <span class="ctrl-icon">🔍</span>
                <span class="ctrl-label">搜索</span>
            </div>
            <div id="btn-source" class="ctrl-item tv-focusable" data-zone="ctrl" tabindex="0" title="切换音源">
                <span class="ctrl-icon">📡</span>
                <span class="ctrl-label">网易云</span>
            </div>

            <div class="ctrl-divider"></div>

            <div id="btn-prev" class="ctrl-item tv-focusable" data-zone="ctrl" tabindex="0" title="上一首">
                <span class="ctrl-icon">⏮</span>
                <span class="ctrl-label">上一首</span>
            </div>
            <div id="btn-play" class="ctrl-item ctrl-play tv-focusable" data-zone="ctrl" tabindex="0" title="播放">
                <span class="ctrl-icon">▶️</span>
            </div>
            <div id="btn-next" class="ctrl-item tv-focusable" data-zone="ctrl" tabindex="0" title="下一首">
                <span class="ctrl-icon">⏭</span>
                <span class="ctrl-label">下一首</span>
            </div>

            <div class="ctrl-divider"></div>

            <div id="btn-mode" class="ctrl-item tv-focusable" data-zone="ctrl" tabindex="0" title="列表循环">
                <span class="ctrl-icon">🔁</span>
                <span class="ctrl-label">循环</span>
            </div>
            <div id="btn-view" class="ctrl-item tv-focusable" data-zone="ctrl" tabindex="0" title="切换视图">
                <span class="ctrl-icon">📋</span>
                <span class="ctrl-label">列表</span>
            </div>
        </div>

        <!-- ===== 右栏：播放区 (~61%) ===== -->
        <div id="right-panel">
            <div id="bg-blur"></div>
            <div id="player-content">
                <!-- 专辑封面 -->
                <div id="album-cover-wrapper">
                    <img id="album-cover" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Crect fill='%231a1a2e' width='400' height='400'/%3E%3Ctext x='200' y='200' text-anchor='middle' dominant-baseline='central' font-size='80' fill='%23333'%3E🎵%3C/text%3E%3C/svg%3E" alt="封面">
                </div>
                <!-- 歌曲信息 -->
                <div id="song-info">
                    <div id="song-title">Solara TV</div>
                    <div id="song-artist">准备播放</div>
                </div>
                <!-- 进度条 -->
                <div id="progress-bar-wrapper">
                    <span id="progress-time-current">00:00</span>
                    <div id="progress-track" class="tv-focusable" data-zone="player" tabindex="0">
                        <div id="progress-fill"></div>
                    </div>
                    <span id="progress-time-total">00:00</span>
                </div>
                <!-- 歌词 -->
                <div id="lyrics-container">
                    <div id="lyrics-text">暂无歌词</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">提示信息</div>

    <!-- 导航提示 -->
    <div id="nav-hint">
        <span class="hint-key">↑↓←→ 导航</span>
        <span class="hint-key">OK 确认</span>
        <span class="hint-key">空格 播放/暂停</span>
    </div>

    <!-- Audio -->
    <audio id="audio-player" preload="auto"></audio>

    <script src="js/tv.js"></script>
</body>
</html>
